name: Publish Container Images

on:
  push:
    branches:
      - main
      - develop
      - test
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: algowiki-web
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image targets
        id: vars
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner}/${IMAGE_NAME}"

          acr_registry_raw="${ACR_REGISTRY:-}"
          acr_registry_host="${acr_registry_raw%%/*}"
          acr_image=""

          if [[ -n "${acr_registry_raw}" && -n "${ACR_NAMESPACE:-}" && -n "${ACR_REPOSITORY:-}" ]]; then
            acr_image="${acr_registry_host}/${ACR_NAMESPACE}/${ACR_REPOSITORY}"
          elif [[ "${acr_registry_raw}" == */* ]]; then
            acr_image="${acr_registry_raw%/}"
          fi

          acr_enabled="0"
          if [[ -n "${acr_image}" && -n "${ACR_USERNAME:-}" && -n "${ACR_PASSWORD:-}" ]]; then
            acr_enabled="1"
          else
            echo "::notice::ACR secrets are incomplete; pushing GHCR only."
          fi

          {
            echo "images<<EOF"
            echo "${ghcr_image}"
            if [[ "${acr_enabled}" == "1" ]]; then
              echo "${acr_image}"
            fi
            echo "EOF"
            echo "acr_enabled=${acr_enabled}"
            echo "acr_registry_host=${acr_registry_host}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ACR
        if: steps.vars.outputs.acr_enabled == '1'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.vars.outputs.acr_registry_host }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=AlgoWiki
            org.opencontainers.image.description=AlgoWiki production image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
