#
# Optional test environment reverse proxy.
# Install this only after DNS for test.algowiki.cn points to the server and a certificate exists.
#

server {
    listen 80;
    listen [::]:80;
    server_name test.algowiki.cn;

    return 301 https://test.algowiki.cn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.algowiki.cn;

    ssl_certificate /etc/letsencrypt/live/algowiki.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/algowiki.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
